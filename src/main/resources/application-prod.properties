# JWT / auth troubleshooting (safe: no full tokens, no secrets). [auth-fail] and [jwt-reject] always at WARN on failures.
# Set true temporarily: [jwt-diag] inbound/issued lines, per-request parse/session hints, plus startup [jwt-signing] keySha256First12 (compare across instances).
app.security.jwt.diagnostic-logging=false

# NEVER enable in real production: logs full JWT + decoded header/payload on parse failure. Signing secret is NEVER logged by this flag.
app.security.jwt.insecure-emergency-trace=false

# Disable DevTools auto-restart in prod
spring.devtools.restart.enabled=false

spring.main.allow-circular-references=true

logging.level.org.springframework.boot.autoconfigure.jdbc=WARN

spring.mail.username=""
spring.mail.password=""

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.auth=true

# Swagger properties
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
