server.port= 8080

#datasource
spring.datasource.url=jdbc:mysql://localhost:3306/JV1?createDatabaseIfNotExist=true&useSSL=true
spring.datasource.username =root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.generate-ddl=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

# Required for ShedLock (@SchedulerLock). Creates shedlock table via db/migration/V2__Create_shedlock_table.sql
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Optional: extra [jwt-diag] logs for JWT pipeline (default false)
app.security.jwt.diagnostic-logging=false

spring.main.allow-circular-references=true

spring.mail.username=""
spring.mail.password=""

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.auth=true
app.email.from-email=your-email@gmail.com
app.email.username=your-email@gmail.com
app.email.password=your-app-password
app.email.company-name=Your Company

# Swagger properties
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
#app.server.url=http://localhost:8080

# Rate limiting settings
app.rate-limiting.enabled=true
app.rate-limiting.limit-for-period=1000
app.rate-limiting.refresh-period=600
app.rate-limiting.timeout-duration=3000

spring.task.scheduling.time-zone=Asia/Kolkata
#spring.jackson.time-zone=Asia/Kolkata

# Password reset URL
app.url.password-reset=http://localhost:3000/reset-password

# CORS configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8081, https://test.ccavenue.com,https://secure.ccavenue.com


# Encryption settings
app.encryption.secret-key=secure-encryption-key-123456789012
app.encryption.legacy-keys=secure-field-encryption-key-456,fieldEncryptionKey123,defaultSecretKey12345678901234567890
app.encryption.debug=true

# Set logging level for encryption classes
logging.level.com.spring.jwt.utils=DEBUG

# SSL configuration
app.ssl.enabled=false
server.ssl.enabled=false
#server.ssl.key-store=classpath:keystore.p12
#server.ssl.key-store-password=yourpassword
#server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=youralias

# --- Logging: Development ---
# Framework: INFO (not DEBUG -- filter chain logs are noise even in dev)
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.access=DEBUG
logging.level.org.springframework.security.web.access=DEBUG

# Application: DEBUG for development visibility
logging.level.com.spring.jwt=DEBUG
logging.level.com.spring.jwt.config=INFO
logging.level.com.spring.jwt.config.filter=DEBUG
logging.level.com.spring.jwt.jwt=DEBUG
logging.level.com.spring.jwt.Question=DEBUG

# Logging configuration for scheduler and repository
logging.level.com.spring.jwt.Exam.scheduler=DEBUG
logging.level.com.spring.jwt.Exam.repository=DEBUG
logging.level.com.spring.jwt.Exam.serviceImpl=DEBUG

# Security Configuration
# Admin secret key for restricted admin registration
app.admin.secret-key=XftCSSafNIgs

# Account security settings
app.security.max-failed-attempts=5
app.security.account-lock-duration-minutes=30

# Device fingerprinting
app.security.device-fingerprinting.enabled=true

# Multipart configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

ccavenue.workingKey=
ccavenue.accessCode=
ccavenue.merchantId=4
ccavenue.statusApiUrl=https://jiojigreenindia.org/api/customer/orders/create
ccavenue.paymentUrl=https://test.ccavenue.com/transaction/transaction.do?command=initiateTransaction

# Base URL
app.baseUrl=https://1st.jiojigreenindia.org

ccavenue.redirectUrl=${app.baseUrl}/api/payment/product/response
ccavenue.cancelUrl=${app.baseUrl}/api/payment/product/cancel

# Farmer payment
farmer.registration.fee=350.00

# Fraud detection thresholds
payment.fraud.max-attempts-per-survey=5
payment.fraud.max-attempts-window-minutes=60
payment.fraud.max-daily-payments-per-user=20
